<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messenger App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        #chat { height: 300px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; }
    </style>
</head>
<body>
    <h1>Messenger</h1>
    <div id="chat"></div>
    <input id="msg" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>

    <script>
        const socket = io(); // الاتصال بالسيرفر

        // استقبال الرسائل
        socket.on('new_message', function(data) {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<p><b>Friend:</b> ${data.body}</p>`;
        });

        // إرسال الرسائل (مؤقتاً بنبعت رسالة لـ recipient_id رقم 2 للتجربة)
        function sendMessage() {
            const body = document.getElementById('msg').value;
            socket.emit('send_message', { recipient_id: 2, body: body });
            document.getElementById('msg').value = '';
        }
    </script>
</body>
</html>
